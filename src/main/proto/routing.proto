syntax = "proto3";
package routing;

import "google/protobuf/empty.proto";

service RoutingService {
  rpc GetRoute (Request) returns (Response);
  rpc Shutdown (google.protobuf.Empty) returns (google.protobuf.Empty);
}

message Request {
  string person_id = 1;
  string from_link_id = 2;
  Coordinate from = 3;
  Coordinate to = 5;
  string to_link_id = 7;
  string mode = 8;
  // Simulation clock instant in nanoseconds since simulation start.
  uint64 departure_time_ns = 9;
  // Simulation clock instant in nanoseconds since simulation start.
  uint64 now_ns = 10;
  bytes request_id = 11;
}

message Response {
  repeated Leg legs = 1;
  repeated Activity activities = 2;
  bytes request_id = 3;
}

message Activity {
  string act_type = 1;
  string link_id = 2;
  Coordinate coordinate = 3;
  // Simulation clock instant in nanoseconds since simulation start.
  optional uint64 start_time_ns = 5;
  // Simulation clock instant in nanoseconds since simulation start.
  optional uint64 end_time_ns = 6;
  // Duration in nanoseconds.
  optional uint64 max_dur_ns = 7;
  map<string, AttributeValue> attributes = 8;
}

message Leg {
  string mode = 1;
  string routing_mode = 2;
  // Simulation clock instant in nanoseconds since simulation start.
  optional uint64 dep_time_ns = 3;
  // Duration in nanoseconds.
  optional uint64 trav_time_ns = 4;
  map<string, AttributeValue> attributes = 6;
  oneof route {
    GenericRoute generic_route = 7;
    NetworkRoute network_route = 8;
    PtRoute pt_route = 9;
  };
}

message GenericRoute {
  string start_link = 1;
  string end_link = 2;
  // Duration in nanoseconds.
  optional uint64 trav_time_ns = 3;
  optional double distance = 4;
  optional string veh_id = 5;
}

message NetworkRoute {
  GenericRoute delegate = 1;
  repeated string route = 2;
}

message PtRoute {
  GenericRoute delegate = 1;
  PtRouteDescription information = 2;
}

message PtRouteDescription {
  string transit_route_id = 1;
  // Duration in nanoseconds.
  optional uint64 boarding_time_ns = 2;
  string transit_line_id = 3;
  string access_facility_id = 4;
  string egress_facility_id = 5;
}

message AttributeValue {
  oneof type {
    int64 int_value = 1;
    string string_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    // to be expanded
  }
}

message Coordinate {
  double x = 1;
  double y = 2;
  optional double z = 3;
}
